<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pedidos - Sushi Ange</title>
  <style>
    :root {
      --rojo: #d62828;
      --rojo-oscuro: #9d0208;
      --negro: #111111;
      --gris: #f4f4f4;
      --texto: #1f1f1f;
      --sombra: 0 10px 28px rgba(0,0,0,.12);
      --radio: 22px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(214,40,40,.14), transparent 32%),
        linear-gradient(180deg, #fff 0%, #f6f6f6 45%, #eeeeee 100%);
      color: var(--texto);
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #111, #2a2a2a);
      color: white;
      text-align: center;
      padding: 28px 16px;
      border-bottom-left-radius: 34px;
      border-bottom-right-radius: 34px;
      box-shadow: var(--sombra);
    }

    header h1 {
      margin: 0;
      font-size: 30px;
      text-transform: uppercase;
    }

    header p {
      margin: 8px 0 0;
      color: #eee;
    }

    main {
      max-width: 950px;
      margin: auto;
      padding: 18px 14px 40px;
    }

    .card {
      background: rgba(255,255,255,.96);
      border-radius: var(--radio);
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: var(--sombra);
      border: 1px solid rgba(0,0,0,.05);
    }

    .login {
      max-width: 420px;
      margin: 40px auto;
    }

    label {
      display: block;
      font-weight: 800;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      padding: 13px;
      border: 1px solid #d7d7d7;
      border-radius: 14px;
      font-size: 15px;
      outline: none;
    }

    input:focus {
      border-color: var(--rojo);
      box-shadow: 0 0 0 4px rgba(214,40,40,.10);
    }

    button {
      border: 0;
      border-radius: 14px;
      padding: 13px 15px;
      font-weight: 900;
      cursor: pointer;
      font-size: 15px;
      transition: transform .12s ease;
    }

    button:active { transform: scale(.98); }

    .primary {
      background: linear-gradient(135deg, var(--rojo), var(--rojo-oscuro));
      color: white;
      width: 100%;
      margin-top: 12px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px;
      align-items: end;
    }

    .bulk-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .btn-soft {
      background: #eee;
      color: #111;
    }

    .btn-select {
      background: #111;
      color: white;
    }

    .btn-danger {
      background: var(--rojo);
      color: white;
    }

    .btn-delete {
      background: #fff1f1;
      color: var(--rojo);
      border: 1px solid rgba(214,40,40,.18);
      padding: 8px 10px;
      font-size: 14px;
      white-space: nowrap;
    }

    .pedido {
      background: white;
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: var(--sombra);
      border: 1px solid #eee;
    }

    .pedido-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      border-bottom: 1px solid #eee;
      padding-bottom: 10px;
      margin-bottom: 10px;
    }

    .pedido h3 {
      margin: 0;
      color: var(--rojo);
      font-size: 19px;
    }

    .pedido-total {
      font-weight: 900;
      font-size: 20px;
      color: var(--rojo);
      white-space: nowrap;
      text-align: right;
    }

    .pedido-actions {
      display: grid;
      gap: 8px;
      justify-items: end;
    }

    .producto {
      padding: 10px;
      background: #f8f8f8;
      border-radius: 14px;
      margin-top: 8px;
    }

    .producto strong {
      color: #111;
    }

    .detalle-roll {
      margin: 5px 0;
      line-height: 1.35;
    }

    .muted {
      color: #666;
      font-size: 14px;
    }

    .empty {
      background: white;
      border-radius: 18px;
      padding: 18px;
      box-shadow: var(--sombra);
    }

    .error {
      color: var(--rojo);
      font-weight: 700;
      margin-top: 10px;
    }

    .select-box {
      display: none;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      padding: 8px 10px;
      background: #fff1f1;
      border: 1px solid rgba(214,40,40,.18);
      border-radius: 12px;
      font-weight: 800;
      color: var(--rojo);
    }

    .select-box.active {
      display: flex;
    }

    .select-box input {
      width: auto;
      transform: scale(1.2);
    }

    .hidden { display: none; }

    @media (max-width: 760px) {
      .toolbar { grid-template-columns: 1fr; }
      .pedido-head { flex-direction: column; }
      .pedido-actions { justify-items: start; }
      header h1 { font-size: 25px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Pedidos</h1>
    <p>Lista simple de pedidos de Sushi Ange</p>
  </header>

  <main>
    <section id="loginBox" class="card login">
      <h2>Ingresar</h2>
      <label>Clave</label>
      <input id="clave" type="password" placeholder="Ingresa tu clave" />
      <button class="primary" onclick="entrar()">Entrar</button>
      <div id="loginError" class="error"></div>
    </section>

    <section id="panel" class="hidden">
      <div class="card">
        <h2>Ver pedidos</h2>

        <div class="toolbar">
          <div>
            <label>Fecha</label>
            <input id="fecha" type="date" />
          </div>
          <button class="btn-soft" onclick="cargarPedidos()">Actualizar</button>
          <button class="btn-soft" onclick="salir()">Salir</button>
        </div>

        <div class="bulk-actions">
          <button id="btnModoSeleccion" class="btn-select" onclick="activarSeleccionPedidos()">Seleccionar pedidos</button>
          <button id="btnSeleccionarTodos" class="btn-soft hidden" onclick="seleccionarTodosPedidos()">Seleccionar todos</button>
          <button id="btnEliminarSeleccionados" class="btn-danger hidden" onclick="eliminarPedidosSeleccionados()">Eliminar seleccionados</button>
          <button id="btnCancelarSeleccion" class="btn-soft hidden" onclick="cancelarSeleccionPedidos()">Cancelar selección</button>
        </div>
      </div>

      <div id="pedidosLista"></div>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
    import {
      getFirestore,
      collection,
      getDocs,
      query,
      orderBy,
      doc,
      deleteDoc
    } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDUMySSnAS5mpEFtncooBFn-268Z8LuD5Y",
      authDomain: "menu-sushi-ange.firebaseapp.com",
      projectId: "menu-sushi-ange",
      storageBucket: "menu-sushi-ange.firebasestorage.app",
      messagingSenderId: "1073224165075",
      appId: "1:1073224165075:web:913b3d109905faf6b61626"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const CLAVE_ADMIN = "1234";

    let pedidosGlobales = [];
    let pedidosDiaActual = [];
    let modoSeleccion = false;
    let pedidosSeleccionados = new Set();

    function formatCLP(valor) {
      return "$" + Number(valor || 0).toLocaleString("es-CL");
    }

    function getFechaObj(pedido) {
      if (pedido.fechaISO) return new Date(pedido.fechaISO);
      if (pedido.creadoEn && typeof pedido.creadoEn.toDate === "function") return pedido.creadoEn.toDate();
      if (pedido.fecha) return new Date(pedido.fecha);
      return null;
    }

    function obtenerFechaLocalPedido(pedido) {
      const fecha = getFechaObj(pedido);
      if (!fecha) return "";
      return fecha.toLocaleDateString("en-CA", { timeZone: "America/Santiago" });
    }

    function obtenerHoraLocalPedido(pedido) {
      const fecha = getFechaObj(pedido);
      if (!fecha) return "";
      return fecha.toLocaleTimeString("es-CL", {
        timeZone: "America/Santiago",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function renderPedido(pedido) {
      const productos = pedido.productos || [];
      const hora = obtenerHoraLocalPedido(pedido);
      const checked = pedidosSeleccionados.has(pedido.id) ? "checked" : "";
      const datosFinales = pedido.datosFinales || {};

      return `
        <div class="pedido">
          <label class="select-box ${modoSeleccion ? "active" : ""}">
            <input type="checkbox" ${checked} onchange="togglePedidoSeleccionado('${pedido.id}', this.checked)">
            Seleccionar este pedido
          </label>

          <div class="pedido-head">
            <div>
              <h3>${pedido.cliente || "Cliente no indicado"}</h3>
              <div class="muted">Hora: ${hora || "No registrada"} · Estado: ${pedido.estado || "nuevo"}</div>
            </div>
            <div class="pedido-actions">
              <div class="pedido-total">${formatCLP(pedido.total)}</div>
              <button class="btn-delete" onclick="eliminarPedido('${pedido.id}')">🗑️ Eliminar</button>
            </div>
          </div>

          ${productos.map(prod => `
            <div class="producto">
              <strong>${prod.nombre || "Producto"}</strong>
              <div class="muted">${prod.piezas || ""}</div>

              ${(prod.detalleRolls || []).map(roll => `
                <div class="detalle-roll">🍣 ${roll.nombre}: ${(roll.ingredientes || []).join(", ")}</div>
              `).join("")}

              ${prod.extraSalmon ? `<div class="muted">Adicional salmón: ${formatCLP(prod.extraSalmon)}</div>` : ""}
              ${prod.extraCuarto ? `<div class="muted">Ingrediente 4 extra: ${formatCLP(prod.extraCuarto)}</div>` : ""}
              ${prod.observaciones ? `<div class="muted">Obs: ${prod.observaciones}</div>` : ""}
              ${prod.obs ? `<div class="muted">Obs: ${prod.obs}</div>` : ""}
            </div>
          `).join("")}

          <div class="producto">
            <strong>Datos finales</strong>
            <div class="muted">Salsas: ${(datosFinales.salsas || ["No indicado"]).join(", ")}</div>
            <div class="muted">Palillos: ${datosFinales.palillos === "Si" ? "Sí, " + datosFinales.cantidadPalillos : "No"}</div>
            ${datosFinales.observacionesFinales ? `<div class="muted">Obs finales: ${datosFinales.observacionesFinales}</div>` : ""}
          </div>
        </div>
      `;
    }

    function actualizarBotonesSeleccion() {
      const ids = [
        "btnSeleccionarTodos",
        "btnEliminarSeleccionados",
        "btnCancelarSeleccion"
      ];

      ids.forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        el.classList.toggle("hidden", !modoSeleccion);
      });

      const btnModo = document.getElementById("btnModoSeleccion");
      if (btnModo) btnModo.classList.toggle("hidden", modoSeleccion);

      const btnEliminar = document.getElementById("btnEliminarSeleccionados");
      if (btnEliminar) {
        const n = pedidosSeleccionados.size;
        btnEliminar.textContent = n ? `Eliminar seleccionados (${n})` : "Eliminar seleccionados";
      }
    }

    window.entrar = function entrar() {
      const clave = document.getElementById("clave").value;
      const error = document.getElementById("loginError");

      if (clave !== CLAVE_ADMIN) {
        error.textContent = "Clave incorrecta.";
        return;
      }

      sessionStorage.setItem("pedidosOK", "true");
      document.getElementById("loginBox").classList.add("hidden");
      document.getElementById("panel").classList.remove("hidden");
      cargarPedidos();
    };

    window.salir = function salir() {
      sessionStorage.removeItem("pedidosOK");
      location.reload();
    };

    window.activarSeleccionPedidos = function activarSeleccionPedidos() {
      modoSeleccion = true;
      pedidosSeleccionados.clear();
      actualizarBotonesSeleccion();
      renderPedidosDia();
    };

    window.cancelarSeleccionPedidos = function cancelarSeleccionPedidos() {
      modoSeleccion = false;
      pedidosSeleccionados.clear();
      actualizarBotonesSeleccion();
      renderPedidosDia();
    };

    window.togglePedidoSeleccionado = function togglePedidoSeleccionado(id, checked) {
      if (checked) {
        pedidosSeleccionados.add(id);
      } else {
        pedidosSeleccionados.delete(id);
      }
      actualizarBotonesSeleccion();
    };

    window.seleccionarTodosPedidos = function seleccionarTodosPedidos() {
      pedidosDiaActual.forEach(p => pedidosSeleccionados.add(p.id));
      actualizarBotonesSeleccion();
      renderPedidosDia();
    };

    window.eliminarPedido = async function eliminarPedido(id) {
      const ok = confirm("¿Seguro que quieres eliminar este pedido? Esta acción no se puede deshacer.");
      if (!ok) return;

      try {
        await deleteDoc(doc(db, "pedidos", id));
        await cargarPedidos();
      } catch (error) {
        console.error(error);
        alert("No se pudo eliminar. Revisa que las reglas de Firestore permitan delete.");
      }
    };

    window.eliminarPedidosSeleccionados = async function eliminarPedidosSeleccionados() {
      const cantidad = pedidosSeleccionados.size;

      if (!cantidad) {
        alert("Selecciona al menos un pedido.");
        return;
      }

      const ok = confirm(`¿Seguro que quieres eliminar ${cantidad} pedido(s)? Esta acción no se puede deshacer.`);
      if (!ok) return;

      try {
        await Promise.all(
          Array.from(pedidosSeleccionados).map(id => deleteDoc(doc(db, "pedidos", id)))
        );

        pedidosSeleccionados.clear();
        modoSeleccion = false;
        actualizarBotonesSeleccion();
        await cargarPedidos();

      } catch (error) {
        console.error(error);
        alert("No se pudieron eliminar los pedidos seleccionados. Revisa las reglas de Firestore.");
      }
    };

    function renderPedidosDia() {
      const lista = document.getElementById("pedidosLista");

      if (!pedidosDiaActual.length) {
        lista.innerHTML = `<div class="empty">No hay pedidos para esta fecha.</div>`;
        return;
      }

      lista.innerHTML = pedidosDiaActual.map(renderPedido).join("");
    }

    window.cargarPedidos = async function cargarPedidos() {
      const fechaSeleccionada = document.getElementById("fecha").value;
      const lista = document.getElementById("pedidosLista");

      lista.innerHTML = `<div class="empty">Cargando pedidos...</div>`;

      try {
        const q = query(collection(db, "pedidos"), orderBy("fechaISO", "desc"));
        const snap = await getDocs(q);

        pedidosGlobales = [];
        snap.forEach(docSnap => {
          pedidosGlobales.push({ id: docSnap.id, ...docSnap.data() });
        });

        pedidosDiaActual = pedidosGlobales.filter(data => obtenerFechaLocalPedido(data) === fechaSeleccionada);

        actualizarBotonesSeleccion();
        renderPedidosDia();

      } catch (error) {
        console.error(error);
        lista.innerHTML = `<div class="empty">No se pudieron cargar los pedidos. Revisa las reglas de Firestore.</div>`;
      }
    };

    function fechaHoyChile() {
      return new Date().toLocaleDateString("en-CA", { timeZone: "America/Santiago" });
    }

    document.getElementById("fecha").value = fechaHoyChile();

    if (sessionStorage.getItem("pedidosOK") === "true") {
      document.getElementById("loginBox").classList.add("hidden");
      document.getElementById("panel").classList.remove("hidden");
      cargarPedidos();
    }
  </script>
</body>
</html>
